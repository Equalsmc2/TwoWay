<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library of Babel - Mirror</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="rift-cover">
        <div class="split-title">
            <h2 class="azure-title">AZURE</h2>
            <div class="title-divider"></div>
            <h2 class="amber-title">AMBER</h2>
        </div>
        <p>Establish Mirror Link</p>
        <div class="login-inputs">
            <input type="text" id="user-id" placeholder="Initialize Manifest / Name...">
            <button id="login-btn">View Mirror</button>
        </div>
    </div>

    <div id="chat-container" class="book-spread" style="display: none;">
        
        <div class="dimensional-spine"></div>

        <div class="book-header">
            <div class="header-page azure-header">
                <span class="team-label">AZURE CODE</span>
                <span id="partner-name" class="char-name"></span>
            </div>
            <div class="header-page amber-header">
                <span id="display-name" class="char-name"></span>
                <span class="team-label">AMBER THREAD</span>
            </div>
        </div>

        <div id="messages" class="pages-container"></div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Transmit sequence / Inscribe thought...">
            <button id="send-btn">PROJECT</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
