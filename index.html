<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library of Babel - Communication Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="container">
        <h2>Enter Character Name</h2>
        <p>Access the Hexagon Terminal</p>
        <input type="text" id="user-id" placeholder="e.g. Elara">
        <button id="login-btn">Connect</button>
    </div>

    <div id="chat-container" class="container" style="display: none;">
        <div class="chat-header">
            <span id="display-name"></span> 
            <span> &harr; </span> 
            <span id="partner-name"></span>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Transcribe message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
